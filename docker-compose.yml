services:
  mongodb:
    image: mongo:8.0.23
    volumes:
      - ${COOLIFY_VOLUME_MONGODB_DATA}:/data/db

  backend:
    image: lens-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Public backend URL routed by Coolify to container port 3030
      - SERVICE_URL_BACKEND_3030

      # Backend app config
      - HOSTNAME=${SERVICE_FQDN_BACKEND_3030}
      - PORT=${PORT:-3030}
      - DB_URL=mongodb://mongodb:27017/backend-db
      - FRONTEND_URL=${SERVICE_URL_FRONTEND}
      - VITE_APP_API_URL=${SERVICE_URL_BACKEND_3030}
      - FC_WORKER_URL=http://127.0.0.1:8080/2015-03-31/functions/function/invocations

      # SMTP
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}

      # Initial admin
      - DEFAULT_ADMIN_EMAIL=admin@local.test
      - DEFAULT_ADMIN_USERNAME=${SERVICE_USER_BACKEND}
      - DEFAULT_ADMIN_PASSWORD=${SERVICE_PASSWORDWITHSYMBOLS_64_BACKEND}
      - DEFAULT_ADMIN_NAME=admin@local.test

      # App secret
      - LOCAL_SIGNED_URL_SECRET=${SERVICE_REALBASE64_64_LENS}

    volumes:
      - ${COOLIFY_VOLUME_UPLOADS_DATA}:/app/uploads
    depends_on:
      - mongodb

  frontend:
    image: lens-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_API_URL=${SERVICE_URL_BACKEND_3030}
        - VITE_MATOMO_URL=${SERVICE_URL_MATOMO_8080:-}
        - VITE_MATOMO_SITE=${VITE_MATOMO_SITE:-}
        - VITE_STRIPE_PURCHASE_PEER_URL=${VITE_STRIPE_PURCHASE_PEER_URL:-}
    environment:
      # Public frontend URL routed by Coolify to container port 80
      - SERVICE_URL_FRONTEND
      - PROXY_SCHEME_PREFIX=${PROXY_SCHEME_PREFIX:-https://}
    depends_on:
      - backend

  fc-worker-redis:
    image: redis:alpine

  fc-worker-api:
    image: lens-fc-worker-api
    build:
      context: ./FC-Worker
      dockerfile: Dockerfile.api
    environment:
      - REDIS_HOST=fc-worker-redis
      - REDIS_PORT=6379
    network_mode: "service:backend"
    depends_on:
      - backend
      - fc-worker-redis

  fc-worker-celery:
    image: lens-fc-worker-celery
    build:
      context: ./FC-Worker
      dockerfile: Dockerfile.celery
    environment:
      - REDIS_HOST=fc-worker-redis
      - REDIS_PORT=6379
      - BACKEND_URL=http://127.0.0.1:3030
    privileged: true
    network_mode: "service:backend"
    depends_on:
      - backend
      - fc-worker-redis

  matomo-db:
    profiles:
      - matomo-enabled
    image: mariadb:11.4.4
    command: --max-allowed-packet=128M
    environment:
      - MYSQL_ROOT_PASSWORD=${SERVICE_PASSWORD_64_MATOMO_DB_ROOT}
      - MYSQL_DATABASE=${MATOMO_DB_NAME:-matomo}
      - MYSQL_USER=${SERVICE_USER_MATOMO_DB}
      - MYSQL_PASSWORD=${SERVICE_PASSWORD_MATOMO_DB}
    volumes:
      - ${COOLIFY_VOLUME_MATOMO_DB}:/var/lib/mysql

  matomo:
    profiles:
      - matomo-enabled
    image: amrit3701/bitnami-matomo:5.8.0-debian-12-r4
    environment:
      # Public Matomo URL routed by Coolify to container port 8080
      - SERVICE_URL_MATOMO_8080

      - MATOMO_DATABASE_HOST=matomo-db
      - MATOMO_DATABASE_TABLE_PREFIX=matomo_
      - MATOMO_DATABASE_USER=${SERVICE_USER_MATOMO_DB}
      - MATOMO_DATABASE_PASSWORD=${SERVICE_PASSWORD_MATOMO_DB}
      - MATOMO_DATABASE_NAME=${MATOMO_DB_NAME:-matomo}

      - MATOMO_WEBSITE_NAME=${MATOMO_WEBSITE_NAME:-Lens}
      - MATOMO_WEBSITE_HOST=${SERVICE_URL_FRONTEND}

      - MATOMO_USERNAME=${SERVICE_USER_MATOMO_ADMIN}
      - MATOMO_PASSWORD=${SERVICE_PASSWORDWITHSYMBOLS_64_MATOMO_ADMIN}
      - MATOMO_EMAIL=${MATOMO_EMAIL:?}
    volumes:
      - ${COOLIFY_VOLUME_MATOMO_DATA}:/bitnami/matomo
    depends_on:
      - matomo-db
